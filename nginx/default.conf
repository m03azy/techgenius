server {
    listen 8080;

    # Serve static files from the default Nginx web root
    root /usr/share/nginx/html;
    index index.html;

    # For multi-page static site: serve exact files if they exist.
    # If a route doesn't match a real file, return 404.
    location / {
        try_files $uri $uri/ =404;
    }

    # Optional: cache static assets more aggressively
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }
}

